name: Integration Tests

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    name: Integration Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install k3d
        run: |
          curl -s https://raw.githubusercontent.com/k3d-io/k3d/main/install.sh | bash

      - name: Create k3d cluster
        run: make k3d-cluster-up

      - name: Install prerequisites
        run: |
          # Install the OpenEverest CRDs, the bundled ValkeyCluster CRD, and the
          # Provider CR. The integration tests simulate the valkey-operator by
          # patching ValkeyCluster status, so the operator is not deployed.
          make install-test-crds
          make install-provider-cr

      - name: Install chainsaw
        run: |
          ARCH=$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/')
          VERSION="0.2.15"
          curl -fsSL -o /tmp/chainsaw.tar.gz "https://github.com/kyverno/chainsaw/releases/download/v${VERSION}/chainsaw_linux_${ARCH}.tar.gz"
          tar -xzf /tmp/chainsaw.tar.gz -C /usr/local/bin chainsaw
          chmod +x /usr/local/bin/chainsaw
          chainsaw version

      - name: Run provider in background
        run: |
          make run &
          sleep 5

      - name: Run integration tests
        run: make test-integration

      - name: Upload chainsaw report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: chainsaw-report-${{ github.run_id }}
          path: /tmp/chainsaw-report*.xml
          retention-days: 7

      - name: Cleanup
        if: always()
        run: make k3d-cluster-down
