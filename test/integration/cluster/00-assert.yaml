# The provider must reconcile the Instance into a ValkeyCluster with the number
# of shards requested by the cluster topology (numShards: 3).
apiVersion: valkey.io/v1alpha1
kind: ValkeyCluster
metadata:
  name: test-valkey-cluster
spec:
  image: valkey/valkey:9.0.0
  shards: 3
  replicas: 1
  exporter:
    enabled: true
