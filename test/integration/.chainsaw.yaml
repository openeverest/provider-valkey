---
apiVersion: chainsaw.kyverno.io/v1alpha2
kind: Configuration
metadata:
  name: integration
spec:
  timeouts:
    apply: 30s
    assert: 60s
    delete: 30s
    error: 30s
    exec: 60s
    cleanup: 60s
  cleanup:
    skipDelete: false
  report:
    format: XML
    name: chainsaw-report
    path: /tmp
