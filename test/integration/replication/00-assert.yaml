# The provider must reconcile the Instance into a ValkeyCluster with a single
# shard (replication topology) and one replica per shard.
apiVersion: valkey.io/v1alpha1
kind: ValkeyCluster
metadata:
  name: test-valkey-replication
spec:
  image: valkey/valkey:9.0.0
  shards: 1
  replicas: 1
  exporter:
    enabled: true
